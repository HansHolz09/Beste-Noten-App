name: Build Compose Multiplatform

on:
  workflow_call:
    inputs:
      module_path:
        type: string
        default: composeApp
      jbr_version:
        type: string
        default: "25.0.2"
      jbr_build:
        type: string
        default: "b329.72"
      temurin_version:
        type: string
        default: "21"
      node_version:
        type: string
        default: "22"
      upload_wasm_as_pages_artifact:
        type: boolean
        default: false
      run_desktop_smoke_tests:
        type: boolean
        default: false
      ignore_artifact_upload_errors:
        type: boolean
        default: false

      build_android:
        type: boolean
        default: true
      build_ios:
        type: boolean
        default: true
      build_windows_x64:
        type: boolean
        default: true
      build_windows_arm64:
        type: boolean
        default: true
      build_macos_x64:
        type: boolean
        default: true
      build_macos_arm64:
        type: boolean
        default: true
      build_linux_x64:
        type: boolean
        default: true
      build_linux_arm64:
        type: boolean
        default: true
      build_wasm:
        type: boolean
        default: true

env:
  MODULE_PATH: ${{ inputs.module_path }}
  JBR_VERSION: ${{ inputs.jbr_version }}
  JBR_BUILD: ${{ inputs.jbr_build }}

jobs:
  android:
    if: ${{ inputs.build_android }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with: { fetch-depth: 0 }

      - name: Prepare Android signing
        shell: bash
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
        run: |
          set -e
          if [ -n "$ANDROID_KEYSTORE_BASE64" ]; then
            echo "$ANDROID_KEYSTORE_BASE64" | base64 -d > "$HOME/release.keystore"
            {
              echo "storeFile=$HOME/release.keystore"
              echo "storePassword=$ANDROID_KEYSTORE_PASSWORD"
              echo "keyAlias=$ANDROID_KEY_ALIAS"
              echo "keyPassword=$ANDROID_KEY_PASSWORD"
            } > keystore.properties
          fi

      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: ${{ inputs.temurin_version }}

      - uses: gradle/actions/setup-gradle@v5

      - name: Build universal APK
        run: |
          set -e
          ./gradlew :androidApp:packageReleaseUniversalApk || ./gradlew :androidApp:assembleRelease
          mkdir -p artifacts
          APK=$(find "androidApp/build" -type f -iname "*universal*.apk" | head -n1)
          if [ -z "$APK" ]; then APK=$(find "androidApp/build" -type f -iname "*release*.apk" | head -n1); fi
          cp "$APK" artifacts/android-universal.apk

      - uses: actions/upload-artifact@v7
        continue-on-error: ${{ inputs.ignore_artifact_upload_errors }}
        with:
          name: android-universal-apk
          path: artifacts/android-universal.apk

  ios:
    if: ${{ inputs.build_ios }}
    runs-on: macos-26
    steps:
      - uses: actions/checkout@v6

      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: ${{ inputs.temurin_version }}

      - name: Cache Kotlin/Native Tooling
        uses: actions/cache@v5
        with:
          path: ~/.konan
          key: ${{ runner.os }}-konan-${{ hashFiles('gradle/libs.versions.toml', 'gradle/wrapper/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-konan-

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v5

      - name: Set up Xcode
        run: sudo xcode-select -s /Applications/Xcode.app

      - name: Xcode Archive (Unsigned)
        run: |
          xcodebuild archive \
            -project iosApp/iosApp.xcodeproj \
            -scheme "Release App" \
            -configuration Release \
            -sdk iphoneos \
            -archivePath "build/iosApp.xcarchive" \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_ENTITLEMENTS="" \
            CODE_SIGNING_IDENTITY=""

      - name: Create Unsigned IPA
        run: |
          mkdir -p Payload
          cp -r "build/iosApp.xcarchive/Products/Applications/"*.app Payload/
          zip -v -r "ios-unsigned.ipa" Payload

      - name: Upload iOS Artifact
        uses: actions/upload-artifact@v7
        continue-on-error: ${{ inputs.ignore_artifact_upload_errors }}
        with:
          name: ios-unsigned-ipa
          path: ios-unsigned.ipa

  windows-x64:
    if: ${{ inputs.build_windows_x64 }}
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v6

      - name: Setup JetBrains Runtime (JBRSDK)
        shell: bash
        run: |
          set -e
          BASE="https://cache-redirector.jetbrains.com/intellij-jbr"
          FILE="jbrsdk-${JBR_VERSION}-windows-x64-${JBR_BUILD}.tar.gz"
          curl -fsSL "$BASE/$FILE" -o "$RUNNER_TEMP/jbr.tar.gz"
          mkdir -p "$RUNNER_TEMP/jbr"
          TARBALL="$(cygpath -u "$RUNNER_TEMP/jbr.tar.gz")"
          DEST="$(cygpath -u "$RUNNER_TEMP/jbr")"
          tar -xzf "$TARBALL" -C "$DEST" --strip-components=1
          echo "JAVA_HOME=$RUNNER_TEMP/jbr" >> $GITHUB_ENV
          echo "$RUNNER_TEMP/jbr/bin" >> $GITHUB_PATH
          java -version

      - uses: gradle/actions/setup-gradle@v5

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ inputs.node_version }}

      - name: Build EXE (x64)
        shell: bash
        run: |
          set -e
          ./gradlew :${MODULE_PATH}:packageReleaseNsis
          mkdir -p artifacts
          EXE=$(find "${MODULE_PATH}/build/compose/binaries/main-release/nsis" -type f -name "*.exe" | head -n1)
          cp "$EXE" artifacts/windows-x64.exe

      - name: Smoke test Windows app
        if: ${{ inputs.run_desktop_smoke_tests }}
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"

          $installer = Get-ChildItem -Path "artifacts" -Filter "*.exe" -File | Select-Object -First 1
          if (-not $installer) {
            throw "No Windows installer found."
          }

          $installDir = Join-Path $env:RUNNER_TEMP "smoke-install"
          New-Item -ItemType Directory -Force -Path $installDir | Out-Null

          function Find-AppExecutable {
            param(
              [Parameter(Mandatory = $true)]
              [string] $Root
            )

            if (-not (Test-Path $Root)) {
              return $null
            }

            $candidates = Get-ChildItem -Path $Root -Recurse -Filter "*.exe" -File -ErrorAction SilentlyContinue |
              Where-Object {
                $_.Name -notmatch "unins|uninstall|setup|installer|update|elevate|java|javaw|keytool|jpackage|jlink" -and
                $_.FullName -notmatch "\\resources\\|\\runtime\\|\\jre\\|\\jdk\\|\\bin\\"
              } |
              Sort-Object `
                @{ Expression = { if ($_.DirectoryName -eq $Root) { 0 } else { 1 } }; Ascending = $true },
                @{ Expression = { $_.DirectoryName.Split([IO.Path]::DirectorySeparatorChar).Count }; Ascending = $true },
                @{ Expression = { $_.Length }; Ascending = $false }

            $candidate = $candidates | Select-Object -First 1

            if ($candidate) {
              return $candidate.FullName
            }

            return $null
          }

          Write-Host "Installing $($installer.FullName) into $installDir"

          $installerProcess = Start-Process `
            -FilePath $installer.FullName `
            -ArgumentList @("/S", "/D=$installDir") `
            -Wait `
            -PassThru

          if ($installerProcess.ExitCode -ne 0) {
            throw "Installer exited with code $($installerProcess.ExitCode)."
          }

          $app = Find-AppExecutable -Root $installDir

          if (-not $app) {
            Write-Host "Installed files:"
            Get-ChildItem -Path $installDir -Recurse -ErrorAction SilentlyContinue |
              Select-Object FullName |
              Out-String -Width 240 |
              Write-Host

            throw "Installed app executable not found."
          }

          Write-Host "Launching $app"

          $process = Start-Process `
            -FilePath $app `
            -WorkingDirectory (Split-Path -Parent $app) `
            -PassThru

          Start-Sleep -Seconds 20

          $watchedProcess = Get-Process -Id $process.Id -ErrorAction SilentlyContinue
          if (-not $watchedProcess) {
            throw "App process exited during startup smoke test."
          }

          Stop-Process -Id $process.Id -Force -ErrorAction SilentlyContinue
          Write-Host "Smoke test passed. App stayed alive for 20 seconds."

      - uses: actions/upload-artifact@v7
        continue-on-error: ${{ inputs.ignore_artifact_upload_errors }}
        with:
          name: windows-x64-exe
          path: artifacts/windows-x64.exe

  windows-arm64:
    if: ${{ inputs.build_windows_arm64 }}
    runs-on: windows-11-arm
    steps:
      - uses: actions/checkout@v6

      - name: Setup JetBrains Runtime (JBRSDK)
        shell: bash
        run: |
          set -e
          BASE="https://cache-redirector.jetbrains.com/intellij-jbr"
          FILE="jbrsdk-${JBR_VERSION}-windows-aarch64-${JBR_BUILD}.tar.gz"
          curl -fsSL "$BASE/$FILE" -o "$RUNNER_TEMP/jbr.tar.gz"
          mkdir -p "$RUNNER_TEMP/jbr"
          TARBALL="$(cygpath -u "$RUNNER_TEMP/jbr.tar.gz")"
          DEST="$(cygpath -u "$RUNNER_TEMP/jbr")"
          tar -xzf "$TARBALL" -C "$DEST" --strip-components=1
          echo "JAVA_HOME=$RUNNER_TEMP/jbr" >> $GITHUB_ENV
          echo "$RUNNER_TEMP/jbr/bin" >> $GITHUB_PATH
          java -version

      - uses: gradle/actions/setup-gradle@v5

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ inputs.node_version }}

      - name: Build EXE (arm64)
        shell: bash
        env:
          ELECTRON_BUILDER_7Z_FILTER: BCJ
        run: |
          set -e
          ./gradlew :${MODULE_PATH}:packageReleaseNsis
          mkdir -p artifacts
          EXE=$(find "${MODULE_PATH}/build/compose/binaries/main-release/nsis" -type f -name "*.exe" | head -n1)
          cp "$EXE" artifacts/windows-arm64.exe

      - name: Smoke test Windows app
        if: ${{ inputs.run_desktop_smoke_tests }}
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"

          $installer = Get-ChildItem -Path "artifacts" -Filter "*.exe" -File | Select-Object -First 1
          if (-not $installer) {
            throw "No Windows installer found."
          }

          $installDir = Join-Path $env:RUNNER_TEMP "smoke-install"
          New-Item -ItemType Directory -Force -Path $installDir | Out-Null

          function Find-AppExecutable {
            param(
              [Parameter(Mandatory = $true)]
              [string] $Root
            )

            if (-not (Test-Path $Root)) {
              return $null
            }

            $candidates = Get-ChildItem -Path $Root -Recurse -Filter "*.exe" -File -ErrorAction SilentlyContinue |
              Where-Object {
                $_.Name -notmatch "unins|uninstall|setup|installer|update|elevate|java|javaw|keytool|jpackage|jlink" -and
                $_.FullName -notmatch "\\resources\\|\\runtime\\|\\jre\\|\\jdk\\|\\bin\\"
              } |
              Sort-Object `
                @{ Expression = { if ($_.DirectoryName -eq $Root) { 0 } else { 1 } }; Ascending = $true },
                @{ Expression = { $_.DirectoryName.Split([IO.Path]::DirectorySeparatorChar).Count }; Ascending = $true },
                @{ Expression = { $_.Length }; Ascending = $false }

            $candidate = $candidates | Select-Object -First 1

            if ($candidate) {
              return $candidate.FullName
            }

            return $null
          }

          Write-Host "Installing $($installer.FullName) into $installDir"

          $installerProcess = Start-Process `
            -FilePath $installer.FullName `
            -ArgumentList @("/S", "/D=$installDir") `
            -Wait `
            -PassThru

          if ($installerProcess.ExitCode -ne 0) {
            throw "Installer exited with code $($installerProcess.ExitCode)."
          }

          $app = Find-AppExecutable -Root $installDir

          if (-not $app) {
            Write-Host "Installed files:"
            Get-ChildItem -Path $installDir -Recurse -ErrorAction SilentlyContinue |
              Select-Object FullName |
              Out-String -Width 240 |
              Write-Host

            throw "Installed app executable not found."
          }

          Write-Host "Launching $app"

          $process = Start-Process `
            -FilePath $app `
            -WorkingDirectory (Split-Path -Parent $app) `
            -PassThru

          Start-Sleep -Seconds 20

          $watchedProcess = Get-Process -Id $process.Id -ErrorAction SilentlyContinue
          if (-not $watchedProcess) {
            throw "App process exited during startup smoke test."
          }

          Stop-Process -Id $process.Id -Force -ErrorAction SilentlyContinue
          Write-Host "Smoke test passed. App stayed alive for 20 seconds."

      - uses: actions/upload-artifact@v7
        continue-on-error: ${{ inputs.ignore_artifact_upload_errors }}
        with:
          name: windows-arm64-exe
          path: artifacts/windows-arm64.exe

  macos-x64:
    if: ${{ inputs.build_macos_x64 }}
    runs-on: macos-26-intel
    steps:
      - uses: actions/checkout@v6

      - name: Setup JetBrains Runtime (JBRSDK)
        shell: bash
        run: |
          set -e
          BASE="https://cache-redirector.jetbrains.com/intellij-jbr"
          FILE="jbrsdk-${JBR_VERSION}-osx-x64-${JBR_BUILD}.tar.gz"
          curl -fsSL "$BASE/$FILE" -o "$RUNNER_TEMP/jbr.tar.gz"
          mkdir -p "$RUNNER_TEMP/jbr"
          tar -xzf "$RUNNER_TEMP/jbr.tar.gz" -C "$RUNNER_TEMP/jbr" --strip-components=1
          echo "JAVA_HOME=$RUNNER_TEMP/jbr/Contents/Home" >> $GITHUB_ENV
          echo "$RUNNER_TEMP/jbr/Contents/Home/bin" >> $GITHUB_PATH
          java -version

      - uses: gradle/actions/setup-gradle@v5

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ inputs.node_version }}

      - name: Build DMG (Apple Silicon)
        run: |
          set -e
          ./gradlew :${MODULE_PATH}:packageReleaseDmg
          mkdir -p artifacts
          DMG=$(find "${MODULE_PATH}/build" -type f -name "*.dmg" | head -n1)
          cp "$DMG" "artifacts/macos-x64.dmg"

      - name: Smoke test macOS app
        if: ${{ inputs.run_desktop_smoke_tests }}
        shell: bash
        run: |
          set -euo pipefail

          DMG="$(find artifacts -type f -name "*.dmg" | head -n1)"
          if [ -z "$DMG" ]; then
            echo "No DMG found."
            exit 1
          fi

          MOUNT="$RUNNER_TEMP/dmg"
          APP_ROOT="$RUNNER_TEMP/app"

          mkdir -p "$MOUNT" "$APP_ROOT"

          cleanup() {
            if [ -n "${PID:-}" ] && kill -0 "$PID" 2>/dev/null; then
              kill "$PID" || true
              wait "$PID" || true
            fi

            hdiutil detach "$MOUNT" -quiet || true
          }

          trap cleanup EXIT

          echo "Mounting $DMG"
          hdiutil attach "$DMG" -nobrowse -readonly -mountpoint "$MOUNT"

          APP_IN_DMG="$(find "$MOUNT" -maxdepth 3 -type d -name "*.app" | head -n1)"
          if [ -z "$APP_IN_DMG" ]; then
            echo "No .app bundle found in DMG."
            find "$MOUNT" -maxdepth 4 -print
            exit 1
          fi

          cp -R "$APP_IN_DMG" "$APP_ROOT/"
          APP="$APP_ROOT/$(basename "$APP_IN_DMG")"

          xattr -dr com.apple.quarantine "$APP" 2>/dev/null || true

          EXEC="$(find "$APP/Contents/MacOS" -maxdepth 1 -type f -perm -111 | head -n1)"
          if [ -z "$EXEC" ]; then
            EXEC="$(find "$APP/Contents/MacOS" -maxdepth 1 -type f | head -n1)"
          fi

          if [ -z "$EXEC" ]; then
            echo "No executable found in app bundle."
            find "$APP/Contents" -maxdepth 4 -print
            exit 1
          fi

          chmod +x "$EXEC"

          echo "Launching $EXEC"
          "$EXEC" &
          PID=$!

          sleep 20

          if kill -0 "$PID" 2>/dev/null; then
            echo "Smoke test passed. App stayed alive for 20 seconds."
          else
            set +e
            wait "$PID"
            CODE=$?
            set -e

            echo "App exited during startup smoke test with exit code $CODE."
            exit 1
          fi

      - uses: actions/upload-artifact@v7
        continue-on-error: ${{ inputs.ignore_artifact_upload_errors }}
        with:
          name: macos-x64-dmg
          path: artifacts/*.dmg

  macos-arm64:
    if: ${{ inputs.build_macos_arm64 }}
    runs-on: macos-26
    steps:
      - uses: actions/checkout@v6

      - name: Setup JetBrains Runtime (JBRSDK)
        shell: bash
        run: |
          set -e
          BASE="https://cache-redirector.jetbrains.com/intellij-jbr"
          FILE="jbrsdk-${JBR_VERSION}-osx-aarch64-${JBR_BUILD}.tar.gz"
          curl -fsSL "$BASE/$FILE" -o "$RUNNER_TEMP/jbr.tar.gz"
          mkdir -p "$RUNNER_TEMP/jbr"
          tar -xzf "$RUNNER_TEMP/jbr.tar.gz" -C "$RUNNER_TEMP/jbr" --strip-components=1
          echo "JAVA_HOME=$RUNNER_TEMP/jbr/Contents/Home" >> $GITHUB_ENV
          echo "$RUNNER_TEMP/jbr/Contents/Home/bin" >> $GITHUB_PATH
          java -version

      - uses: gradle/actions/setup-gradle@v5

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ inputs.node_version }}

      - name: Build DMG (Apple Silicon)
        run: |
          set -e
          ./gradlew :${MODULE_PATH}:packageReleaseDmg
          mkdir -p artifacts
          DMG=$(find "${MODULE_PATH}/build" -type f -name "*.dmg" | head -n1)
          cp "$DMG" "artifacts/macos-arm64.dmg"

      - name: Smoke test macOS app
        if: ${{ inputs.run_desktop_smoke_tests }}
        shell: bash
        run: |
          set -euo pipefail

          DMG="$(find artifacts -type f -name "*.dmg" | head -n1)"
          if [ -z "$DMG" ]; then
            echo "No DMG found."
            exit 1
          fi

          MOUNT="$RUNNER_TEMP/dmg"
          APP_ROOT="$RUNNER_TEMP/app"

          mkdir -p "$MOUNT" "$APP_ROOT"

          cleanup() {
            if [ -n "${PID:-}" ] && kill -0 "$PID" 2>/dev/null; then
              kill "$PID" || true
              wait "$PID" || true
            fi

            hdiutil detach "$MOUNT" -quiet || true
          }

          trap cleanup EXIT

          echo "Mounting $DMG"
          hdiutil attach "$DMG" -nobrowse -readonly -mountpoint "$MOUNT"

          APP_IN_DMG="$(find "$MOUNT" -maxdepth 3 -type d -name "*.app" | head -n1)"
          if [ -z "$APP_IN_DMG" ]; then
            echo "No .app bundle found in DMG."
            find "$MOUNT" -maxdepth 4 -print
            exit 1
          fi

          cp -R "$APP_IN_DMG" "$APP_ROOT/"
          APP="$APP_ROOT/$(basename "$APP_IN_DMG")"

          xattr -dr com.apple.quarantine "$APP" 2>/dev/null || true

          EXEC="$(find "$APP/Contents/MacOS" -maxdepth 1 -type f -perm -111 | head -n1)"
          if [ -z "$EXEC" ]; then
            EXEC="$(find "$APP/Contents/MacOS" -maxdepth 1 -type f | head -n1)"
          fi

          if [ -z "$EXEC" ]; then
            echo "No executable found in app bundle."
            find "$APP/Contents" -maxdepth 4 -print
            exit 1
          fi

          chmod +x "$EXEC"

          echo "Launching $EXEC"
          "$EXEC" &
          PID=$!

          sleep 20

          if kill -0 "$PID" 2>/dev/null; then
            echo "Smoke test passed. App stayed alive for 20 seconds."
          else
            set +e
            wait "$PID"
            CODE=$?
            set -e

            echo "App exited during startup smoke test with exit code $CODE."
            exit 1
          fi

      - uses: actions/upload-artifact@v7
        continue-on-error: ${{ inputs.ignore_artifact_upload_errors }}
        with:
          name: macos-arm64-dmg
          path: artifacts/*.dmg

  linux-x64:
    if: ${{ inputs.build_linux_x64 }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install packaging tools
        run: |
          sudo apt-get update
          sudo apt-get install -y fakeroot rpm

      - name: Setup JetBrains Runtime (JBRSDK)
        run: |
          set -e
          BASE="https://cache-redirector.jetbrains.com/intellij-jbr"
          FILE="jbrsdk-${JBR_VERSION}-linux-x64-${JBR_BUILD}.tar.gz"
          curl -fsSL "$BASE/$FILE" -o "$RUNNER_TEMP/jbr.tar.gz"
          mkdir -p "$RUNNER_TEMP/jbr"
          tar -xzf "$RUNNER_TEMP/jbr.tar.gz" -C "$RUNNER_TEMP/jbr" --strip-components=1
          echo "JAVA_HOME=$RUNNER_TEMP/jbr" >> $GITHUB_ENV
          echo "$RUNNER_TEMP/jbr/bin" >> $GITHUB_PATH
          java -version

      - uses: gradle/actions/setup-gradle@v5

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ inputs.node_version }}

      - name: Build DEB
        run: |
          set -e
          ./gradlew :${MODULE_PATH}:packageReleaseDeb
          mkdir -p artifacts
          DEB=$(find "${MODULE_PATH}/build" -maxdepth 6 -type f -name "*.deb" | head -n1)
          cp "$DEB" "artifacts/linux-x64.deb"

      - name: Smoke test Linux app
        if: ${{ inputs.run_desktop_smoke_tests }}
        shell: bash
        run: |
          set -euo pipefail

          DEB="$(find artifacts -type f -name "*.deb" | head -n1)"
          if [ -z "$DEB" ]; then
            echo "No DEB found."
            exit 1
          fi

          DEB_ABS="$(realpath "$DEB")"
          PACKAGE_NAME="$(dpkg-deb -f "$DEB_ABS" Package)"

          APT_UPDATED=0

          apt_update_once() {
            if [ "$APT_UPDATED" -eq 0 ]; then
              sudo apt-get update
              APT_UPDATED=1
            fi
          }

          if ! command -v xvfb-run >/dev/null 2>&1; then
            echo "xvfb-run is missing. Installing xvfb only as fallback."
            apt_update_once
            sudo apt-get install -y xvfb
          fi

          echo "Installing $DEB_ABS"
          if ! sudo apt-get install -y "$DEB_ABS"; then
            echo "Install failed. Updating apt metadata once and retrying."
            apt_update_once
            sudo apt-get install -y "$DEB_ABS"
          fi

          if ! ldconfig -p | grep -q "libEGL.so.1"; then
            echo "libEGL.so.1 is missing on this runner. Installing minimal EGL runtime for Skiko."
            apt_update_once
            sudo apt-get install -y libegl1
          fi

          APP="$(
            while IFS= read -r file; do
              resolved="$(readlink -f "$file" 2>/dev/null || true)"

              if [ -z "$resolved" ]; then
                continue
              fi

              if [ ! -f "$resolved" ] || [ ! -x "$resolved" ]; then
                continue
              fi

              case "$resolved" in
                */runtime/*|*/jre/*|*/jdk/*|*/lib/*|*/bin/java|*/bin/javaw|*.so)
                  continue
                  ;;
              esac

              base="$(basename "$resolved")"
              if echo "$base" | grep -Eiq "uninstall|remove|update|setup|installer"; then
                continue
              fi

              case "$file" in
                /usr/bin/*|/usr/local/bin/*|/opt/*)
                  echo "$file"
                  break
                  ;;
              esac
            done < <(dpkg -L "$PACKAGE_NAME")
          )"

          if [ -z "$APP" ]; then
            echo "Installed package files:"
            dpkg -L "$PACKAGE_NAME"

            echo "Could not find installed Linux app executable."
            exit 1
          fi

          LOG_FILE="$RUNNER_TEMP/linux-smoke-test.log"

          echo "Launching $APP with Xvfb"
          xvfb-run -a "$APP" > "$LOG_FILE" 2>&1 &
          PID=$!

          sleep 20

          if kill -0 "$PID" 2>/dev/null; then
            kill "$PID" || true
            wait "$PID" || true
            echo "Smoke test passed. App stayed alive for 20 seconds."
          else
            set +e
            wait "$PID"
            CODE=$?
            set -e

            echo "App exited during startup smoke test with exit code $CODE."
            echo "App output:"
            cat "$LOG_FILE" || true
            exit 1
          fi

      - uses: actions/upload-artifact@v7
        continue-on-error: ${{ inputs.ignore_artifact_upload_errors }}
        with:
          name: linux-x64-deb
          path: artifacts/*.deb

  linux-arm64:
    if: ${{ inputs.build_linux_arm64 }}
    runs-on: ubuntu-24.04-arm
    steps:
      - uses: actions/checkout@v6

      - name: Install packaging tools
        run: |
          sudo apt-get update
          sudo apt-get install -y fakeroot rpm

      - name: Setup JetBrains Runtime (JBRSDK)
        run: |
          set -e
          BASE="https://cache-redirector.jetbrains.com/intellij-jbr"
          FILE="jbrsdk-${JBR_VERSION}-linux-aarch64-${JBR_BUILD}.tar.gz"
          curl -fsSL "$BASE/$FILE" -o "$RUNNER_TEMP/jbr.tar.gz"
          mkdir -p "$RUNNER_TEMP/jbr"
          tar -xzf "$RUNNER_TEMP/jbr.tar.gz" -C "$RUNNER_TEMP/jbr" --strip-components=1
          echo "JAVA_HOME=$RUNNER_TEMP/jbr" >> $GITHUB_ENV
          echo "$RUNNER_TEMP/jbr/bin" >> $GITHUB_PATH
          java -version

      - uses: gradle/actions/setup-gradle@v5

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ inputs.node_version }}

      - name: Build DEB
        run: |
          set -e
          ./gradlew :${MODULE_PATH}:packageReleaseDeb
          mkdir -p artifacts
          DEB=$(find "${MODULE_PATH}/build" -maxdepth 6 -type f -name "*.deb" | head -n1)
          cp "$DEB" "artifacts/linux-arm64.deb"

      - name: Smoke test Linux app
        if: ${{ inputs.run_desktop_smoke_tests }}
        shell: bash
        run: |
          set -euo pipefail

          DEB="$(find artifacts -type f -name "*.deb" | head -n1)"
          if [ -z "$DEB" ]; then
            echo "No DEB found."
            exit 1
          fi

          DEB_ABS="$(realpath "$DEB")"
          PACKAGE_NAME="$(dpkg-deb -f "$DEB_ABS" Package)"

          APT_UPDATED=0

          apt_update_once() {
            if [ "$APT_UPDATED" -eq 0 ]; then
              sudo apt-get update
              APT_UPDATED=1
            fi
          }

          if ! command -v xvfb-run >/dev/null 2>&1; then
            echo "xvfb-run is missing. Installing xvfb only as fallback."
            apt_update_once
            sudo apt-get install -y xvfb
          fi

          echo "Installing $DEB_ABS"
          if ! sudo apt-get install -y "$DEB_ABS"; then
            echo "Install failed. Updating apt metadata once and retrying."
            apt_update_once
            sudo apt-get install -y "$DEB_ABS"
          fi

          if ! ldconfig -p | grep -q "libEGL.so.1"; then
            echo "libEGL.so.1 is missing on this runner. Installing minimal EGL runtime for Skiko."
            apt_update_once
            sudo apt-get install -y libegl1
          fi

          APP="$(
            while IFS= read -r file; do
              resolved="$(readlink -f "$file" 2>/dev/null || true)"

              if [ -z "$resolved" ]; then
                continue
              fi

              if [ ! -f "$resolved" ] || [ ! -x "$resolved" ]; then
                continue
              fi

              case "$resolved" in
                */runtime/*|*/jre/*|*/jdk/*|*/lib/*|*/bin/java|*/bin/javaw|*.so)
                  continue
                  ;;
              esac

              base="$(basename "$resolved")"
              if echo "$base" | grep -Eiq "uninstall|remove|update|setup|installer"; then
                continue
              fi

              case "$file" in
                /usr/bin/*|/usr/local/bin/*|/opt/*)
                  echo "$file"
                  break
                  ;;
              esac
            done < <(dpkg -L "$PACKAGE_NAME")
          )"

          if [ -z "$APP" ]; then
            echo "Installed package files:"
            dpkg -L "$PACKAGE_NAME"

            echo "Could not find installed Linux app executable."
            exit 1
          fi

          LOG_FILE="$RUNNER_TEMP/linux-smoke-test.log"

          echo "Launching $APP with Xvfb"
          xvfb-run -a "$APP" > "$LOG_FILE" 2>&1 &
          PID=$!

          sleep 20

          if kill -0 "$PID" 2>/dev/null; then
            kill "$PID" || true
            wait "$PID" || true
            echo "Smoke test passed. App stayed alive for 20 seconds."
          else
            set +e
            wait "$PID"
            CODE=$?
            set -e

            echo "App exited during startup smoke test with exit code $CODE."
            echo "App output:"
            cat "$LOG_FILE" || true
            exit 1
          fi

      - uses: actions/upload-artifact@v7
        continue-on-error: ${{ inputs.ignore_artifact_upload_errors }}
        with:
          name: linux-arm64-deb
          path: artifacts/*.deb

  wasm:
    if: ${{ inputs.build_wasm }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: ${{ inputs.temurin_version }}

      - uses: gradle/actions/setup-gradle@v5

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ inputs.node_version }}

      - name: Build WASM Distribution
        run: |
          set -e
          ./gradlew :${MODULE_PATH}:wasmJsBrowserDistribution

      - name: Upload WASM as normal artifact
        if: ${{ !inputs.upload_wasm_as_pages_artifact }}
        uses: actions/upload-artifact@v7
        continue-on-error: ${{ inputs.ignore_artifact_upload_errors }}
        with:
          name: wasm-dist
          path: ${{ env.MODULE_PATH }}/build/dist/wasmJs/productionExecutable

      - name: Upload Pages Artifact
        if: ${{ inputs.upload_wasm_as_pages_artifact }}
        uses: actions/upload-pages-artifact@v3
        with:
          path: ${{ env.MODULE_PATH }}/build/dist/wasmJs/productionExecutable