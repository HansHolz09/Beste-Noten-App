name: CI

on:
  push:
    branches:
      - "**"
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.event.pull_request.head.repo.full_name || github.repository }}-${{ github.head_ref || github.ref_name }}
  cancel-in-progress: true

jobs:
  ktlint:
    name: ktlintCheck
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up JDK
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "21"

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v5

      - name: Run ktlintCheck
        run: ./gradlew ktlintCheck

  desktop-binaries:
    name: Build desktop release binaries
    uses: ./.github/workflows/buildCompose.yml
    with:
      upload_wasm_as_pages_artifact: false
      build_android: false
      build_ios: false
      build_windows_x64: true
      build_windows_arm64: true
      build_macos_x64: true
      build_macos_arm64: true
      build_linux_x64: true
      build_linux_arm64: true
      build_wasm: false
    secrets: inherit

  other-release-binaries:
    name: Build non-desktop release binaries
    uses: ./.github/workflows/buildCompose.yml
    with:
      upload_wasm_as_pages_artifact: false
      build_android: true
      build_ios: true
      build_windows_x64: false
      build_windows_arm64: false
      build_macos_x64: false
      build_macos_arm64: false
      build_linux_x64: false
      build_linux_arm64: false
      build_wasm: true
    secrets: inherit

  desktop-smoke-test:
    name: Smoke test ${{ matrix.name }}
    needs:
      - ktlint
      - desktop-binaries
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 25

    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Windows x64
            runner: windows-latest
            artifact: windows-x64-exe
            platform: windows

          - name: Windows arm64
            runner: windows-11-arm
            artifact: windows-arm64-exe
            platform: windows

          - name: macOS x64
            runner: macos-26-intel
            artifact: macos-x64-dmg
            platform: macos

          - name: macOS arm64
            runner: macos-26
            artifact: macos-arm64-dmg
            platform: macos

          - name: Linux x64
            runner: ubuntu-latest
            artifact: linux-x64-deb
            platform: linux

          - name: Linux arm64
            runner: ubuntu-22.04-arm
            artifact: linux-arm64-deb
            platform: linux

    steps:
      - name: Download desktop artifact
        uses: actions/download-artifact@v8
        with:
          name: ${{ matrix.artifact }}
          path: smoke-artifact

      - name: Install and launch Windows app
        if: matrix.platform == 'windows'
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"

          $installer = Get-ChildItem -Path "smoke-artifact" -Filter "*.exe" -File | Select-Object -First 1
          if (-not $installer) {
            throw "No Windows installer found."
          }

          $installDir = Join-Path $env:RUNNER_TEMP "smoke-install"
          New-Item -ItemType Directory -Force -Path $installDir | Out-Null

          function Find-AppExecutable {
            param(
              [Parameter(Mandatory = $true)]
              [string] $Root
            )

            if (-not (Test-Path $Root)) {
              return $null
            }

            $candidates = Get-ChildItem -Path $Root -Recurse -Filter "*.exe" -File -ErrorAction SilentlyContinue |
              Where-Object {
                $_.Name -notmatch "unins|uninstall|setup|installer|update|elevate|java|javaw|keytool|jpackage|jlink" -and
                $_.FullName -notmatch "\\resources\\|\\runtime\\|\\jre\\|\\jdk\\|\\bin\\"
              } |
              Sort-Object `
                @{ Expression = { if ($_.DirectoryName -eq $Root) { 0 } else { 1 } }; Ascending = $true },
                @{ Expression = { $_.DirectoryName.Split([IO.Path]::DirectorySeparatorChar).Count }; Ascending = $true },
                @{ Expression = { $_.Length }; Ascending = $false }

            $candidate = $candidates | Select-Object -First 1

            if ($candidate) {
              return $candidate.FullName
            }

            return $null
          }

          Write-Host "Installing $($installer.FullName) into $installDir"

          $installerProcess = Start-Process `
            -FilePath $installer.FullName `
            -ArgumentList @("/S", "/D=$installDir") `
            -Wait `
            -PassThru

          if ($installerProcess.ExitCode -ne 0) {
            throw "Installer exited with code $($installerProcess.ExitCode)."
          }

          Write-Host "Installed files:"
          Get-ChildItem -Path $installDir -Recurse -ErrorAction SilentlyContinue |
            Select-Object FullName |
            Out-String -Width 240 |
            Write-Host

          $app = Find-AppExecutable -Root $installDir

          if (-not $app) {
            throw "Installed app executable not found."
          }

          Write-Host "Launching $app"

          $process = Start-Process `
            -FilePath $app `
            -WorkingDirectory (Split-Path -Parent $app) `
            -PassThru

          Start-Sleep -Seconds 20

          $watchedProcess = Get-Process -Id $process.Id -ErrorAction SilentlyContinue
          if (-not $watchedProcess) {
            throw "App process exited during startup smoke test."
          }

          Stop-Process -Id $process.Id -Force -ErrorAction SilentlyContinue
          Write-Host "Smoke test passed. App stayed alive for 20 seconds."

      - name: Mount and launch macOS app
        if: matrix.platform == 'macos'
        shell: bash
        run: |
          set -euo pipefail

          DMG="$(find smoke-artifact -type f -name "*.dmg" | head -n1)"
          if [ -z "$DMG" ]; then
            echo "No DMG found."
            exit 1
          fi

          MOUNT="$RUNNER_TEMP/dmg"
          APP_ROOT="$RUNNER_TEMP/app"

          mkdir -p "$MOUNT" "$APP_ROOT"

          cleanup() {
            if [ -n "${PID:-}" ] && kill -0 "$PID" 2>/dev/null; then
              kill "$PID" || true
              wait "$PID" || true
            fi

            hdiutil detach "$MOUNT" -quiet || true
          }

          trap cleanup EXIT

          echo "Mounting $DMG"
          hdiutil attach "$DMG" -nobrowse -readonly -mountpoint "$MOUNT"

          APP_IN_DMG="$(find "$MOUNT" -maxdepth 3 -type d -name "*.app" | head -n1)"
          if [ -z "$APP_IN_DMG" ]; then
            echo "No .app bundle found in DMG."
            find "$MOUNT" -maxdepth 4 -print
            exit 1
          fi

          cp -R "$APP_IN_DMG" "$APP_ROOT/"
          APP="$APP_ROOT/$(basename "$APP_IN_DMG")"

          xattr -dr com.apple.quarantine "$APP" || true

          EXEC="$(find "$APP/Contents/MacOS" -maxdepth 1 -type f -perm -111 | head -n1)"
          if [ -z "$EXEC" ]; then
            EXEC="$(find "$APP/Contents/MacOS" -maxdepth 1 -type f | head -n1)"
          fi

          if [ -z "$EXEC" ]; then
            echo "No executable found in app bundle."
            find "$APP/Contents" -maxdepth 4 -print
            exit 1
          fi

          chmod +x "$EXEC"

          echo "Launching $EXEC"
          "$EXEC" &
          PID=$!

          sleep 20

          if kill -0 "$PID" 2>/dev/null; then
            echo "Smoke test passed. App stayed alive for 20 seconds."
          else
            set +e
            wait "$PID"
            CODE=$?
            set -e

            echo "App exited during startup smoke test with exit code $CODE."
            exit 1
          fi

      - name: Install and launch Linux app
        if: matrix.platform == 'linux'
        shell: bash
        run: |
          set -euo pipefail

          DEB="$(find smoke-artifact -type f -name "*.deb" | head -n1)"
          if [ -z "$DEB" ]; then
            echo "No DEB found."
            exit 1
          fi

          DEB_ABS="$(realpath "$DEB")"
          PACKAGE_NAME="$(dpkg-deb -f "$DEB_ABS" Package)"

          APT_UPDATED=0

          apt_update_once() {
            if [ "$APT_UPDATED" -eq 0 ]; then
              sudo apt-get update
              APT_UPDATED=1
            fi
          }

          if ! command -v xvfb-run >/dev/null 2>&1; then
            echo "xvfb-run is missing. Installing xvfb only as fallback."
            apt_update_once
            sudo apt-get install -y xvfb
          fi

          echo "Installing $DEB_ABS"
          if ! sudo apt-get install -y "$DEB_ABS"; then
            echo "Install failed. Updating apt metadata once and retrying."
            apt_update_once
            sudo apt-get install -y "$DEB_ABS"
          fi

          if ! ldconfig -p | grep -q "libEGL.so.1"; then
            echo "libEGL.so.1 is missing on this runner. Installing minimal EGL runtime for Skiko."
            apt_update_once
            sudo apt-get install -y libegl1
          fi

          APP="$(
            while IFS= read -r file; do
              resolved="$(readlink -f "$file" 2>/dev/null || true)"

              if [ -z "$resolved" ]; then
                continue
              fi

              if [ ! -f "$resolved" ] || [ ! -x "$resolved" ]; then
                continue
              fi

              case "$resolved" in
                */runtime/*|*/jre/*|*/jdk/*|*/lib/*|*/bin/java|*/bin/javaw|*.so)
                  continue
                  ;;
              esac

              base="$(basename "$resolved")"
              if echo "$base" | grep -Eiq "uninstall|remove|update|setup|installer"; then
                continue
              fi

              case "$file" in
                /usr/bin/*|/usr/local/bin/*|/opt/*)
                  echo "$file"
                  break
                  ;;
              esac
            done < <(dpkg -L "$PACKAGE_NAME")
          )"

          if [ -z "$APP" ]; then
            echo "Installed package files:"
            dpkg -L "$PACKAGE_NAME"

            echo "Could not find installed Linux app executable."
            exit 1
          fi

          LOG_FILE="$RUNNER_TEMP/linux-smoke-test.log"

          echo "Launching $APP with Xvfb"
          xvfb-run -a "$APP" > "$LOG_FILE" 2>&1 &
          PID=$!

          sleep 20

          if kill -0 "$PID" 2>/dev/null; then
            kill "$PID" || true
            wait "$PID" || true
            echo "Smoke test passed. App stayed alive for 20 seconds."
          else
            set +e
            wait "$PID"
            CODE=$?
            set -e

            echo "App exited during startup smoke test with exit code $CODE."
            echo "App output:"
            cat "$LOG_FILE" || true
            exit 1
          fi