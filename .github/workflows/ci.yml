name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.event.pull_request.head.repo.full_name || github.repository }}-${{ github.head_ref || github.ref_name }}
  cancel-in-progress: true

jobs:
  ktlint:
    name: ktlintCheck
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up JDK
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "21"

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v6

      - name: Run ktlintCheck
        run: ./gradlew ktlintCheck

  release-binaries:
    name: Build release binaries and run smoke tests
    uses: ./.github/workflows/buildCompose.yml
    with:
      upload_wasm_as_pages_artifact: false
      run_desktop_smoke_tests: true
      ignore_artifact_upload_errors: true
      build_android: true
      build_ios: true
      build_windows_x64: true
      build_windows_arm64: false
      build_macos_x64: false
      build_macos_arm64: true
      build_linux_x64: true
      build_linux_arm64: true
      build_wasm: true
    secrets: inherit

  ci-success:
    name: ci-success
    runs-on: ubuntu-latest
    needs:
      - ktlint
      - release-binaries
    if: always()
    steps:
      - name: Check CI result
        run: |
          if [ "${{ needs.ktlint.result }}" != "success" ]; then
            echo "ktlint failed"
            exit 1
          fi

          if [ "${{ needs.release-binaries.result }}" != "success" ]; then
            echo "release-binaries failed"
            exit 1
          fi

          echo "All required CI jobs passed"